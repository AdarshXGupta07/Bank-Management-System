<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accounts</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="accounts">
  <div class="layout">
    <aside class="sidebar"><h2>🏦 BankMS</h2><nav class="nav">
      <a href="dashboard.html">Dashboard</a><a href="customers.html">Customers</a><a class="active" href="accounts.html">Accounts</a><a href="loans.html">Loans</a><a href="payments.html">Payments</a>
    </nav></aside>
    <main class="main">
      <h1>Account Module</h1>
      <div id="alert" class="alert"></div>
      <section class="panel">
        <form id="accountForm">
          <input name="account_no" placeholder="Account Number" required />
          <input name="cust_id" placeholder="Customer ID" required />
          <input name="balance" type="number" step="0.01" placeholder="Initial Balance" required />
          <select name="account_type"><option value="SAVING">SAVING</option><option value="CURRENT">CURRENT</option></select>
          <button type="submit">Create Account</button>
        </form>
      </section>
      <section class="panel">
        <form id="depositForm">
          <input name="account_no" placeholder="Account Number" required /><input name="amount" type="number" step="0.01" placeholder="Deposit Amount" required />
          <button type="submit" class="secondary">Deposit</button>
        </form>
        <form id="withdrawForm" style="margin-top:10px;">
          <input name="account_no" placeholder="Account Number" required /><input name="amount" type="number" step="0.01" placeholder="Withdraw Amount" required />
          <button type="submit" class="danger">Withdraw</button>
        </form>
      </section>
      <section class="panel"><div class="table-wrap"><table id="accountTable"></table></div></section>
    </main>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
