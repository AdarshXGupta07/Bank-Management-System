<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payments</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="payments">
  <div class="layout">
    <aside class="sidebar"><h2>🏦 BankMS</h2><nav class="nav">
      <a href="dashboard.html">Dashboard</a><a href="customers.html">Customers</a><a href="accounts.html">Accounts</a><a href="loans.html">Loans</a><a class="active" href="payments.html">Payments</a>
    </nav></aside>
    <main class="main">
      <h1>Payment Module</h1>
      <div id="alert" class="alert"></div>
      <section class="panel">
        <form id="paymentForm">
          <input name="payment_no" placeholder="Payment Number" required />
          <input name="loan_no" placeholder="Loan Number" required />
          <input name="payment_date" type="date" required />
          <input name="payment_amount" type="number" step="0.01" placeholder="Payment Amount" required />
          <button type="submit">Record Payment</button>
        </form>
      </section>
      <section class="panel"><div class="table-wrap"><table id="paymentTable"></table></div></section>
    </main>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
