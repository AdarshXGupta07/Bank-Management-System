<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customers</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="customers">
  <div class="layout">
    <aside class="sidebar"><h2>🏦 BankMS</h2><nav class="nav">
      <a href="dashboard.html">Dashboard</a><a class="active" href="customers.html">Customers</a><a href="accounts.html">Accounts</a><a href="loans.html">Loans</a><a href="payments.html">Payments</a>
    </nav></aside>
    <main class="main">
      <h1>Customer Module</h1>
      <div id="alert" class="alert"></div>
      <section class="panel">
        <form id="customerForm">
          <input name="cust_id" placeholder="Customer ID" required />
          <input name="name" placeholder="Name" required />
          <input name="mobile_no" placeholder="Mobile Number" required />
          <input name="address" placeholder="Address" required />
          <button type="submit">Add Customer</button>
        </form>
      </section>
      <section class="panel">
        <div class="toolbar"><input id="searchInput" placeholder="Search customer..." /></div>
        <div class="table-wrap"><table id="customerTable"></table></div>
        <div class="pagination"><button id="prevPage" class="secondary">Prev</button><button id="nextPage" class="secondary">Next</button></div>
      </section>
    </main>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
